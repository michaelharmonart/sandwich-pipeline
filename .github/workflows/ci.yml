name: CI — Lint & Type Check

on:
  push:
    branches: ["prod"]
  pull_request:
    branches: ["prod"]

permissions:
  contents: read

jobs:
  lint_and_types:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Copy shotgun.pyi stub
        run: |
          cat "${GITHUB_WORKSPACE}/.githooks/shotgun.pyi" > "${GITHUB_WORKSPACE}/pipeline/lib/shotgun_api3/shotgun_api3/__init__.pyi"

      # Run type checking with ty
      - name: Type Check (mypy)
        run: |
          uv run mypy

      # Run ruff lint checks
      - name: Lint (Ruff)
        run: uv run ruff check

      - name: Telemetry Contract Check
        run: |
          PYTHONPATH=pipeline uv run python -m pipe.telemetry.docs --check --output docs/telemetry/EVENT_CONTRACT.md

      # Run ruff format check
      - name: Format Check (Ruff)
        run: uv run ruff format --check
